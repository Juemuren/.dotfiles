[helpers]

[settings]
default_target_type = "automatic"

[bash.files]
"bash/scripts" = "~/.local/bin"

[conda.files]
"conda.yaml" = "~/.condarc"

[fastfetch.files]
"fastfetch/fastfetch.jsonc" = "~/.config/fastfetch/config.jsonc"
"fastfetch/sakiko.txt" = "~/.local/share/fastfetch/sakiko.txt"

[git.files]
"git/git.ini" = "~/.gitconfig"
[git.variables]
git_name = ""
git_email = ""

[npm.files]
"npm.ini" = "~/.npmrc"

[pixi.files]
"pixi/pixi.toml" = "~/.pixi/config.toml"
"pixi/global.toml" = "~/.pixi/manifests/pixi-global.toml"

[pnpm.files]
"pnpm.yaml" = "~/.config/pnpm/config.yaml"
[pnpm.variables]
pnpm_store = "~/AppData/Local/pnpm/store"

[starship.files]
"starship.toml" = "~/.config/starship.toml"

[uv.files]
"uv.toml" = "~/.config/uv/uv.toml"

[vim.files]
"vim.vim" = "~/.vimrc"

[vscode.files]
"vscode/profiles/global/keybindings.jsonc" = "~/.config/Code/User/keybindings.json"
"vscode/profiles/global/settings.jsonc" = "~/.config/Code/User/settings.json"
"vscode/profiles/global/snippets" = "~/.config/Code/User/snippets"
"vscode/scripts" = "~/.local/bin"
