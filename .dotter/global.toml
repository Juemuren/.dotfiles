[helpers]

[settings]
default_target_type = "automatic"

[default]
depends = [
    "bash",
    "conda",
    "fastfetch",
    "git",
    "mise",
    "pixi",
    "starship",
    "uv",
    "vim",
    "vscode",
    "zsh",
]

[conda.files]
"conda.yaml" = "~/.condarc"

[bash.files]
"bash/ibat.sh" = "~/.local/bin/ibat.sh"
"bash/irg.sh" = "~/.local/bin/irg.sh"
"bash/isd.sh" = "~/.local/bin/isd.sh"
"bash/jq-path.sh" = "~/.local/bin/jq-path.sh"
"bash/jq-content.sh" = "~/.local/bin/jq-content.sh"

[fastfetch.files]
"fastfetch/fastfetch.jsonc" = "~/.config/fastfetch/config.jsonc"
"fastfetch/sakiko.txt" = "~/.local/share/fastfetch/sakiko.txt"

[git.files]
"git.ini" = "~/.gitconfig"

[git.variables]
git_name = ""
git_email = ""

[mise.files]
"mise/mise.toml" = "~/.config/mise/config.toml"

[pixi.files]
"pixi.toml" = "~/.pixi/manifests/pixi-global.toml"

[starship.files]
"starship.toml" = "~/.config/starship.toml"

[uv.files]
"uv.toml" = "~/.config/uv/uv.toml"

[vim.files]
"vim.vim" = "~/.vimrc"

[vscode.files]
"vscode/default/settings.jsonc" = "~/.config/Code/User/settings.json"

[zsh.files]
"zsh.sh" = "~/.zshrc"
